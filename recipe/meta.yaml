{% set name = "pytest-dependency" %}
{% set version = "0.6.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pytest-dependency/pytest_dependency-0.6.1.tar.gz
  sha256: 246c24d2a5fc743a942cec4408853640e56a05ba58d46e5b213a1d4b738a2464

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -v --no-deps --no-build-isolation
  skip: true  # [py<34]

requirements:
  host:
    - pip
    - python
    - setuptools
    - wheel
    - distutils_pytest
  run:
    - pytest >=3.7.0
    - python
    - setuptools

test:
  source_files:
    - tests
    - doc/examples
  imports:
    - pytest_dependency
  requires:
    - pip
    - setuptools
    - pytest
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -ra -v --tb=short tests

about:
  home: https://github.com/RKrahl/pytest-dependency
  summary: Manage dependencies of tests
  description: |
    This pytest plugin manages dependencies of tests.
    It allows to mark some tests as dependent from other tests.
    These tests will then be skipped if any of the dependencies did fail or has been skipped.
  license: Apache-2.0
  license_file: LICENSE.txt
  license_family: Apache
  dev_url: https://github.com/RKrahl/pytest-dependency
  doc_url: https://github.com/RKrahl/pytest-dependency

extra:
  recipe-maintainers:
    - Windiana42
