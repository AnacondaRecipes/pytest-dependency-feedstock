{% set name = "pytest-dependency" %}
{% set version = "0.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 934b0e6a39d95995062c193f7eaeed8a8ffa06ff1bcef4b62b0dc74a708bacc1

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -v --no-deps --no-build-isolation
  skip: true  # [py<34]

requirements:
  host:
    - pip
    - python
    - setuptools
    - wheel
    - setuptools_scm
  run:
    - pytest >=3.7.0
    - python
    - setuptools

# All error similar to other tests, reffering to path issue
# $SRC_DIR/tests/test_09_examples_usage.py:118: in test_runtime
#     with get_example("runtime.py").open("rt") as f:
#          ^^^^^^^^^^^^^^^^^^^^^^^^^
# $SRC_DIR/tests/conftest.py:10: in get_example
#     assert path.is_file()
# E   AssertionError: assert False
# E    +  where False = is_file()
# E    +    where is_file = PosixPath('$SRC_DIR/doc/examples/runtime.py').is_file
{% set ignore_tests = " --ignore=tests/test_09_examples_usage.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/test_09_examples_advanced.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/test_09_examples_names.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/test_09_examples_scope.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/test_09_examples_debugging.py" %}

test:
  source_files:
    - tests
  imports:
    - pytest_dependency
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -ra -v --tb=short tests {{ignore_tests}}

about:
  home: https://github.com/RKrahl/pytest-dependency
  summary: Manage dependencies of tests
  description: |
    This pytest plugin manages dependencies of tests.
    It allows to mark some tests as dependent from other tests.
    These tests will then be skipped if any of the dependencies did fail or has been skipped.
  license: Apache-2.0
  license_file: LICENSE.txt
  license_family: Apache
  dev_url: https://github.com/RKrahl/pytest-dependency
  doc_url: https://github.com/RKrahl/pytest-dependency

extra:
  recipe-maintainers:
    - Windiana42